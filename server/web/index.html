<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudStream Web</title>
  <meta name="description" content="Access and stream media files from your private linux server using your CloudStream extensions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/colors.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="theme-amoled">
  <div id="app-container">
    <!-- Sidebar Navigation -->
    <aside id="sidebar-nav">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">CloudStream</span>
      </div>
      <nav class="nav-links">
        <a href="#/" class="nav-item active" id="nav-home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-text">Home</span>
        </a>
        <a href="#/search" class="nav-item" id="nav-search">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="nav-text">Search</span>
        </a>
        <a href="#/bookmarks" class="nav-item" id="nav-bookmarks">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span class="nav-text">Bookmarks</span>
        </a>
        <a href="#/history" class="nav-item" id="nav-history">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="nav-text">History</span>
        </a>
        <a href="#/downloads" class="nav-item" id="nav-downloads">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="nav-text">Downloads</span>
        </a>
        <a href="#/plugins" class="nav-item" id="nav-plugins">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span class="nav-text">Plugins</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content">
      <header id="top-bar">
        <h1 id="page-title">Home</h1>
        <div class="provider-selector-container">
          <select id="active-provider-select">
            <option value="">All Providers</option>
          </select>
        </div>
      </header>
      
      <!-- Dynamic Page Outlet -->
      <section id="view-outlet"></section>
    </main>
  </div>

  <!-- Notification Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
