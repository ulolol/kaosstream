version: '3.8'

services:
  cloudstream:
    build: .
    container_name: cloudstream-server
    ports:
      - "2106:2106"
    volumes:
      - cloudstream-data:/data
    environment:
      - CS_PORT=2106
      - CS_DATA_DIR=/data
      - CS_CHALLENGE_URL=http://challenge-browser:3210
    depends_on:
      - challenge-browser
    restart: unless-stopped

  challenge-browser:
    build:
      context: ./server/challenge
      dockerfile: Dockerfile
    container_name: cloudstream-challenge-browser
    expose:
      - "3210"
    restart: unless-stopped

volumes:
  cloudstream-data:
